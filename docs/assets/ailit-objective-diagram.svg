  <text x="274" y="514" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#064E3B">workflows</text>

  <circle cx="372" cy="418" r="58" fill="#FFFBEB" stroke="#FCD34D" stroke-width="2"/>
  <text x="372" y="411" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850" fill="#92400E">Org</text>
  <text x="372" y="435" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#92400E">standards</text>

  <text x="274" y="594" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#374151">skills, standards, prompts, policies</text>

