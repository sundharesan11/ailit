  <text x="1326" y="333" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600" fill="#4B5563">Existing tools still do the work</text>

  <circle cx="1236" cy="424" r="48" fill="#ECFDF5"/>
  <text x="1236" y="433" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#064E3B">Codex</text>
  <circle cx="1326" cy="424" r="48" fill="#ECFDF5"/>
  <text x="1326" y="433" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850" fill="#064E3B">Claude</text>
  <circle cx="1416" cy="424" r="48" fill="#ECFDF5"/>
  <text x="1416" y="433" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="850" fill="#064E3B">Cursor</text>
  <text x="1326" y="523" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#374151">one setup model</text>
  <text x="1326" y="552" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#374151">many agent tools</text>

