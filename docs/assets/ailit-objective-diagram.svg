  <rect x="548" y="690" width="504" height="78" rx="24" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="2"/>
  <text x="800" y="722" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850" fill="#111827">Open-source parent repo</text>
  <text x="800" y="750" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="650" fill="#4B5563">CLI, templates, integrations, setup checks, and context preparation</text>
