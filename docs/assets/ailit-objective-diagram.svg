  <path d="M704 474C727 446 873 446 896 474" stroke="#A7F3D0" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="474" r="19" fill="#FBBF24"/>

  <text x="800" y="532" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#F9FAFB">sets up project AI files</text>
  <text x="800" y="562" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#F9FAFB">combines org + project context</text>
  <text x="800" y="592" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800" fill="#F9FAFB">prepares agent-ready output</text>

