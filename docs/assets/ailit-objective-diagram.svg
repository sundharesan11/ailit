  <path d="M480 438H540" stroke="#4B5563" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M480 728C526 728 552 674 600 624" stroke="#4B5563" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M1044 438H1108" stroke="#4B5563" stroke-width="3.2" stroke-linecap="round" marker-end="url(#arrow)"/>

